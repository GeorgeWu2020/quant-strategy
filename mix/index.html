async function unlock() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>解密中…';
  document.getElementById('err').style.display = 'none';

  try {
    const raw    = atob(PAYLOAD);
    const salt   = new Uint8Array(16).map((_, i) => raw.charCodeAt(i));
    const enc    = new Uint8Array(raw.length - 16).map((_, i) => raw.charCodeAt(i + 16));
    const enc_pw = new TextEncoder().encode(pw);

    const keyMat = await crypto.subtle.importKey('raw', enc_pw, 'PBKDF2', false, ['deriveBits']);
    const bits   = await crypto.subtle.deriveBits(
      { name:'PBKDF2', salt:salt, iterations:100000, hash:'SHA-256' },
      keyMat, 256
    );
    const key  = new Uint8Array(bits);
    const dec  = enc.map((b, i) => b ^ key[i % 32]);
    const html = new TextDecoder().decode(dec);

    if (!html.startsWith('<!DOCTYPE')) {
      throw new Error('wrong password');
    }

    document.open(); document.write(html); document.close();
  } catch(e) {
    document.getElementById('err').style.display = 'block';
    btn.disabled = false;
    btn.textContent = '進入';
  }
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});
</script>
